<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智簡 AI - 智慧客服機器人 Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .demo-container {
            max-width: 800px;
            margin: 6rem auto 4rem auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border: 1px solid var(--slate-200);
            display: flex;
            flex-direction: column;
            height: 75vh;
            min-height: 600px;
            overflow: hidden;
        }

        /* Chat UI Container */
        .chat-header {
            background: var(--navy);
            padding: 1.25rem 2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 4px solid var(--gold);
        }

        .chat-window {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background-color: #f8fafc;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            max-width: 80%;
            animation: slideUpFade 0.3s ease-out forwards;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: var(--gold);
            color: var(--navy);
        }

        .avatar.user {
            background: var(--slate-300);
            color: white;
        }

        .bubble {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .bubble.ai {
            background: white;
            border: 1px solid var(--slate-200);
            border-top-left-radius: 0;
            color: var(--slate);
        }

        .bubble.user {
            background: var(--navy);
            color: white;
            border-top-right-radius: 0;
        }

        /* Interactive Bottom Area */
        .chat-input-area {
            background: white;
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--slate-200);
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .preset-btn {
            background: var(--slate-light);
            border: 1px solid var(--slate-300);
            padding: 0.75rem 1.25rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--navy);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preset-btn:hover {
            border-color: var(--navy);
            background: #f1f5f9;
        }

        .preset-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Jumping Dots Animation */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--slate-400);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
                background: var(--gold);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .demo-container {
                margin: 5rem 1rem 2rem 1rem;
                height: 80vh;
                min-height: 500px;
            }

            .chat-header {
                padding: 1rem;
            }

            .chat-header h2 {
                font-size: 1.1rem !important;
            }

            .chat-window {
                padding: 1rem;
            }

            .chat-input-area {
                padding: 1rem;
            }

            .preset-btn {
                padding: 0.625rem 1rem;
                font-size: 0.875rem;
                width: 100%;
                justify-content: center;
            }

            .bubble {
                padding: 0.75rem 1rem;
                font-size: 0.95rem;
            }

            nav .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>

<body class="bg-slate-light">

    <!-- 頂部導覽列 -->
    <nav class="navbar navbar-scrolled" id="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo" onclick="console.log('🖱️ 點擊 Logo (Demo)');">
                <span class="logo-icon">智</span>
                <span class="logo-text">智簡 <span class="logo-sub">Zhi Jian</span></span>
            </a>
            <div class="navbar-links">
                <a href="index.html#services" class="nav-link" onclick="console.log('🖱️ 導覽：服務介紹');">服務介紹</a>
                <a href="index.html#demos" class="nav-link" onclick="console.log('🖱️ 導覽：Demo 體驗');">Demo 體驗</a>
                <a href="index.html#faq" class="nav-link" onclick="console.log('🖱️ 導覽：常見問題');">常見問題</a>
                <a href="index.html#contact" class="nav-link" onclick="console.log('🖱️ 導覽：聯絡我們');">聯絡我們</a>
                <a href="index.html#contact" class="btn-primary"
                    style="padding: 0.5rem 1.25rem; font-size: 0.875rem; text-decoration: none; margin-left: 0.5rem;"
                    onclick="console.log('🖱️ 點擊導覽 CTA');">免費諮詢 <i data-lucide="arrow-right" class="icon-sm"></i></a>
            </div>
        </div>
    </nav>

    <div class="container relative z-10" style="padding-top: 2rem;">
        <div class="demo-container">

            <!-- 對話框標頭 -->
            <div class="chat-header">
                <i data-lucide="database" style="color: var(--gold); width: 2rem; height: 2rem;"></i>
                <div>
                    <h2 style="font-size: 1.25rem; font-weight: 700; margin: 0;">AI 智慧客服機器人</h2>
                    <p style="font-size: 0.85rem; opacity: 0.8; margin: 0;">為您的業務提供 24 小時不打烊的快速回覆</p>
                </div>
            </div>

            <!-- 對話歷史區 -->
            <div class="chat-window" id="chat-window">
                <!-- 預設歡迎對話 -->
                <div class="message ai">
                    <div class="avatar ai"><i data-lucide="bot" style="width:1.5rem; height:1.5rem;"></i></div>
                    <div class="bubble ai">
                        您好！我是智簡客服小幫手 🤖<br>
                        請問有什麼我可以為您服務的？您可以直接點擊下方常見問題：
                    </div>
                </div>
            </div>

            <!-- 使用者操作區 (強制選擇) -->
            <div class="chat-input-area">
                <p style="font-size: 0.875rem; color: var(--slate); margin-bottom: 0.75rem; font-weight: 600;">
                    請點擊下方情境發問（防止開放輸入）：</p>
                <div class="preset-buttons" id="preset-buttons">
                    <button class="preset-btn" data-scenario="leave">
                        <i data-lucide="help-circle"></i> 請問你們的收費方式？
                    </button>
                    <button class="preset-btn" data-scenario="travel">
                        <i data-lucide="building"></i> 公司只有 5 個人適合導入嗎？
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- UI 互動邏輯 -->
    <script>
        lucide.createIcons();

        const chatWindow = document.getElementById('chat-window');
        const presetButtons = document.getElementById('preset-buttons');
        const buttons = document.querySelectorAll('.preset-btn');

        // 定義 AI 回覆的完美假資料
        const aiResponses = {
            leave: "智簡的服務分為幾個階段：<br><br>1. <strong>免費 30 分鐘流程健檢</strong>：幫您抓出隱形浪費。<br>2. <strong>客製化提案</strong>：不推銷大系統，能用免費工具串接絕不多花錢。<br>3. <strong>專屬工具開發</strong>：依實際需求透明報價，價格遠低於您想像。<br><br>💡 我們承諾：絕不向您強迫推銷不必要的大型系統！",
            travel: "非常適合！<br><br>事實上，5～50 人的中小型企業是我們最主要的服務對象。<br>規模越小，每個人節省的時間比例越高，投資報酬率反而更快顯現。<br><br>💡 一個小流程每天為您省下 30 分鐘，一年就為公司多出 100 多小時的寶貴戰力！"
        };

        // 幫對話框自動捲動到底部
        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', function () {
                // 1. 禁用所有按鈕
                buttons.forEach(b => b.disabled = true);

                // 2. 獲取使用者選的文字
                const userText = this.innerText.trim();
                const scenario = this.getAttribute('data-scenario');

                // 3. 畫出使用者的 Bubble
                const userMsgHtml = `
                    <div class="message user">
                        <div class="avatar user"><i data-lucide="user" style="width:1.5rem; height:1.5rem;"></i></div>
                        <div class="bubble user">${userText}</div>
                    </div>
                `;
                chatWindow.insertAdjacentHTML('beforeend', userMsgHtml);
                lucide.createIcons();
                scrollToBottom();

                // 4. 畫出 AI 正在輸入的動畫 (Typing indicator)
                const typingObjId = 'typing-' + Date.now();
                const typingHtml = `
                    <div class="message ai" id="${typingObjId}">
                        <div class="avatar ai"><i data-lucide="bot" style="width:1.5rem; height:1.5rem;"></i></div>
                        <div class="bubble ai" style="display:flex; align-items:center;">
                            <span style="font-size:0.875rem; margin-right:0.5rem; font-weight:600;">讀取知識庫中</span>
                            <div class="typing-indicator">
                                <div class="dot"></div>
                                <div class="dot"></div>
                                <div class="dot"></div>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    chatWindow.insertAdjacentHTML('beforeend', typingHtml);
                    lucide.createIcons();
                    scrollToBottom();

                    // 5. 假裝運算 1.2 秒後，替換成文字
                    setTimeout(() => {
                        const typingElement = document.getElementById(typingObjId);
                        typingElement.remove(); // 移除打字動畫

                        const aiReplyHtml = `
                            <div class="message ai">
                                <div class="avatar ai"><i data-lucide="bot" style="width:1.5rem; height:1.5rem;"></i></div>
                                <div class="bubble ai">${aiResponses[scenario]}</div>
                            </div>
                        `;
                        chatWindow.insertAdjacentHTML('beforeend', aiReplyHtml);
                        lucide.createIcons();
                        scrollToBottom();

                        // 選項：讓按鈕恢復，可以玩另一個 (我們這裡示範玩過就算了，不再解鎖)
                        // buttons.forEach(b => b.disabled = false);

                    }, 1200);

                }, 400); // 稍微延遲產生「打字中」的體感
            });
        });
    </script>
</body>

</html>
